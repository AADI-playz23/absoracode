name: Wake Kaggle Brain

on:
  workflow_dispatch: 

jobs:
  deploy-brain:
    runs-on: ubuntu-latest
    
    steps:
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Kaggle CLI
        run: pip install kaggle
        
      - name: Push AI Brain to Kaggle GPU
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
          # Assuming you have your GitHub Personal Access Token saved as GH_TOKEN or GITHUB_TOKEN
          GH_TOKEN: ${{ secrets.GH_TOKEN }} 
        run: |
          mkdir -p kaggle_brain
          cd kaggle_brain
          
          # 1. Create Kaggle Configuration File
          # IMPORTANT: Change 'YOUR_KAGGLE_USERNAME' below to your actual Kaggle username!
          cat << 'EOF' > kernel-metadata.json
          {
            "id": "Aadi/absoracode-brain",
            "title": "AbsoraCode Brain",
            "code_file": "brain.py",
            "language": "python",
            "kernel_type": "script",
            "is_private": "true",
            "enable_gpu": "true",
            "enable_internet": "true",
            "dataset_sources": [],
            "competition_sources": [],
            "kernel_sources": []
          }
          EOF
          
          # 2. Create the AI Brain Script
          cat << EOF2 > brain.py
          import os, requests, json, base64, subprocess, time

          GITHUB_TOKEN = "${GH_TOKEN}"
          REPO = "AADI-playz23/absoracode"

          print("🛠️ Installing Ollama on Kaggle...")
          os.system("curl -fsSL https://ollama.com/install.sh | sh > /dev/null 2>&1")

          print("🧠 Starting Ollama...")
          subprocess.Popen(["ollama", "serve"], stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL)
          time.sleep(5)
          
          print("📥 Pulling Qwen 2.5 Coder (14B)...")
          os.system("ollama pull qwen2.5-coder:14b")

          print("🚇 Starting Tunnel via Localtunnel...")
          os.system("npm install -g localtunnel > /dev/null 2>&1")
          proc = subprocess.Popen(["lt", "--port", "11434"], stdout=subprocess.PIPE, stderr=subprocess.PIPE, text=True)

          brain_url = None
          for _ in range(60):
              line = proc.stdout.readline()
              if "url is" in line:
                  brain_url = line.split("url is:")[-1].strip()
                  print(f"\n✅ KAGGLE BRAIN LIVE: {brain_url}")
                  break
              time.sleep(1)

          if brain_url:
              print(f"📡 Pushing URL to {REPO}/status.json ...")
              api_url = f"https://api.github.com/repos/{REPO}/contents/status.json"
              headers = {"Authorization": f"token {GITHUB_TOKEN}", "Accept": "application/vnd.github.v3+json"}
              
              try:
                  curr = requests.get(api_url, headers=headers).json()
                  content = json.loads(base64.b64decode(curr["content"]))
                  content['brain_url'] = brain_url
                  
                  requests.put(api_url, headers=headers, json={
                      "message": "Update Kaggle Brain URL",
                      "content": base64.b64encode(json.dumps(content).encode()).decode(),
                      "sha": curr["sha"]
                  })
                  print("🎉 SUCCESS: GitHub Registry Updated!")
              except Exception as e:
                  print(f"❌ Error updating GitHub: {e}")

          print("\n⏳ Kaggle GPU Active. Sleeping to keep alive...")
          # Kaggle allows up to 12 hours max per session. We will sleep for 11.5 hours.
          time.sleep(41400) 
          EOF2
          
          # 3. Trigger Kaggle GPU
          echo "🚀 Sending command to Kaggle API..."
          kaggle kernels push
