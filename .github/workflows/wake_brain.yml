name: Wake Kaggle Brain

on:
  workflow_dispatch: # Allows your Node.js server/frontend to trigger this on demand

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Kaggle CLI
        run: pip install kaggle

      - name: Inject GitHub Token into brain.py
        # Securely injects the GH_TOKEN so brain.py can update status.json
        run: |
          sed -i 's|os.environ.get("GH_TOKEN")|"${{ secrets.GH_TOKEN }}"|g' brain.py

      - name: Push to Kaggle
        # The Kaggle CLI requires these secrets to authenticate the push itself
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          # This command looks for brain.py and kernel-metadata.json in the current folder.
          # (If your files are inside a specific folder like 'kaggle_brain', change '.' to 'kaggle_brain')
          kaggle kernels push -p .
