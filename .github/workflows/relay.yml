name: Nexus Relay (Cloudflare Edition)

on:
  workflow_dispatch:
  repository_dispatch:
    types: [handoff]

jobs:
  relay:
    runs-on: ubuntu-latest
    timeout-minutes: 355 # ~6 hours
    permissions:
      contents: write
      
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v4
        with: { python-version: '3.10' }
        
      - name: Install Dependencies
        run: pip install fastapi uvicorn requests nest_asyncio

      - name: Setup Cloudflare Tunnel
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          mv cloudflared-linux-amd64 cloudflared
          chmod +x cloudflared

      - name: Start Relay & Tunnel
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python -c '
          import os, time, requests, json, base64, uvicorn, subprocess, threading, re, sys
          from fastapi import FastAPI, Request
          from fastapi.middleware.cors import CORSMiddleware

          app = FastAPI()
          app.add_middleware(CORSMiddleware, allow_origins=["*"], allow_methods=["*"], allow_headers=["*"])

          repo = os.environ.get("REPO")
          gh_token = os.environ.get("GH_TOKEN")

          # --- 1. PROXY LOGIC (BULLETPROOF EDITION) ---
          @app.post("/v1/chat/completions")
          @app.post("/api/chat")
          async def proxy(request: Request):
              try:
                  # 1. Fetch Brain URL securely via API (Bypasses GitHub cache and 404s)
                  api_url = f"https://api.github.com/repos/{repo}/contents/status.json"
                  headers_gh = {
                      "Authorization": f"token {gh_token}", 
                      "Accept": "application/vnd.github.v3+json"
                  }
                  gh_res = requests.get(api_url, headers=headers_gh)
                  
                  if gh_res.status_code != 200:
                      return {"error": "Failed to read status.json", "details": gh_res.text}
                      
                  content = json.loads(base64.b64decode(gh_res.json()["content"]).decode())
                  
                  # 2. Extract URL and remove trailing slashes to prevent //api/chat formatting errors
                  brain_url = content.get("brain_url", "").rstrip("/")
                  
                  # 3. Forward payload to Colab
                  headers = {
                      "Bypass-Tunnel-Reminder": "true",
                      "User-Agent": "Nexus-Relay/1.0"
                  }
                  payload = await request.json()
                  resp = requests.post(f"{brain_url}/api/chat", headers=headers, json=payload)
                  
                  # 4. Safely parse the response so it never crashes on plain-text errors again!
                  try:
                      return resp.json()
                  except Exception:
                      return {"error": "Colab rejected the request", "details": f"HTTP {resp.status_code}: {resp.text}"}
                      
              except Exception as e: 
                  return {"error": "Relay Exception", "details": str(e)}

          # --- 2. START CLOUDFLARE TUNNEL ---
          def start_server():
              uvicorn.run(app, host="0.0.0.0", port=8000)
          
          threading.Thread(target=start_server, daemon=True).start()
          time.sleep(3)

          print("🚇 Starting Cloudflare Tunnel...", flush=True)
          proc = subprocess.Popen(["./cloudflared", "tunnel", "--url", "http://localhost:8000"], 
                                  stdout=subprocess.PIPE, stderr=subprocess.PIPE, text=True)

          relay_url = None
          print("🔍 Reading Cloudflare logs...", flush=True)
          
          start_time = time.time()
          while time.time() - start_time < 30:
              line = proc.stderr.readline()
              if line:
                  print(f"CF LOG: {line.strip()}", flush=True)
                  if "trycloudflare.com" in line:
                      match = re.search(r"https://[a-zA-Z0-9-]+\.trycloudflare\.com", line)
                      if match:
                          relay_url = match.group(0)
                          break
          
          if not relay_url:
              print("❌ Cloudflare failed to generate a URL. Check the CF LOG above.", flush=True)
              sys.exit(1)
          
          print(f"✅ RELAY LIVE: {relay_url}", flush=True)

          # --- 3. UPDATE GITHUB REGISTRY ---
          api_url = f"https://api.github.com/repos/{repo}/contents/status.json"
          headers = {
              "Authorization": f"token {gh_token}",
              "Accept": "application/vnd.github.v3+json"
          }
          
          try:
              curr = requests.get(api_url, headers=headers).json()
              content = json.loads(base64.b64decode(curr["content"]))
              content["relay_url"] = relay_url
              content["last_updated"] = time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime())
              
              requests.put(api_url, headers=headers, json={
                  "message": "Update Relay URL (Cloudflare)",
                  "content": base64.b64encode(json.dumps(content).encode()).decode(),
                  "sha": curr["sha"]
              })
              print("🎉 GitHub Registry Updated!", flush=True)
          except Exception as e:
              print(f"❌ Failed to update registry: {e}", flush=True)

          # --- 4. HANDOFF TIMER ---
          print("⏳ Node Active. Sleeping for 5.5 hours...", flush=True)
          time.sleep(19800)
          
          print("♻️ Triggering Handoff...", flush=True)
          requests.post(f"https://api.github.com/repos/{repo}/dispatches", 
                        headers=headers, json={"event_type": "handoff"})
          
          time.sleep(300)
          '
