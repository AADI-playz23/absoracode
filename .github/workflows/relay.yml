name: AbsoraCloud Relay
on:
  workflow_dispatch:
  repository_dispatch:
    types: [handoff]

jobs:
  run-relay:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      
      - name: Start Relay & Tunnel
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          npm install express node-fetch@2 localtunnel
          
          # Start Middleman
          node server.js &
          
          # Open tunnel for Middleman
          npx lt --port 8000 > relay_url.txt &
          sleep 10
          RELAY_URL=$(cat relay_url.txt | grep -o 'https://[^ ]*')
          
          # Update status.json with the Middleman URL
          python3 -c "
          import requests, json, base64, os
          url = '$RELAY_URL'
          token = os.environ.get('GH_TOKEN')
          repo = 'AADI-playz23/absoracode'
          api_url = f'https://api.github.com/repos/{repo}/contents/status.json'
          headers = {'Authorization': f'token {token}'}
          
          res = requests.get(api_url, headers=headers).json()
          data = json.loads(base64.b64decode(res['content']))
          data['relay_url'] = url
          
          requests.put(api_url, headers=headers, json={
              'message': 'Update Relay URL',
              'content': base64.b64encode(json.dumps(data).encode()).decode(),
              'sha': res['sha']
          })
          "
          echo "✅ RELAY LIVE: $RELAY_URL"
          
          # Stay awake for 5.5 hours
          sleep 19800 
          
          # Start the next runner before dying
          curl -X POST https://api.github.com/repos/AADI-playz23/absoracode/dispatches \
          -H "Authorization: token $GH_TOKEN" -d '{"event_type": "handoff"}'
