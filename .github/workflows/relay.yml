name: Nexus Relay (Cloudflare Edition)

on:
  workflow_dispatch:
  repository_dispatch:
    types: [handoff]

jobs:
  relay:
    runs-on: ubuntu-latest
    timeout-minutes: 355 # ~6 hours
    permissions:
      contents: write # Required to update status.json
      
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with: { python-version: '3.10' }
        
      - name: Install Dependencies
        run: pip install fastapi uvicorn requests nest_asyncio

      - name: Setup Cloudflare Tunnel
        run: |
          # FIXED: Proper download link for the cloudflared binary
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          mv cloudflared-linux-amd64 cloudflared
          chmod +x cloudflared

      - name: Start Relay & Tunnel
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }} # Ensure you have this in your repository secrets!
          REPO: ${{ github.repository }}
        run: |
          python -c '
          import os, time, requests, json, base64, uvicorn, subprocess, threading, re
          from fastapi import FastAPI, Request
          from fastapi.middleware.cors import CORSMiddleware

          app = FastAPI()
          app.add_middleware(CORSMiddleware, allow_origins=["*"], allow_methods=["*"], allow_headers=["*"])

          # FIXED: Extract env vars here to avoid quote-escaping issues in the f-strings below
          repo = os.environ.get("REPO")
          gh_token = os.environ.get("GH_TOKEN")

          # --- 1. PROXY LOGIC ---
          @app.post("/v1/chat/completions")
          async def proxy(request: Request):
              # FIXED: Added missing slash
              status_url = f"https://raw.githubusercontent.com/{repo}/main/status.json"
              try:
                  brain_url = requests.get(status_url).json()["brain_url"]
                  return requests.post(f"{brain_url}/api/chat", json=await request.json()).json()
              except Exception as e: 
                  return {"error": "Brain Offline", "details": str(e)}

          # --- 2. START CLOUDFLARE TUNNEL ---
          def start_server():
              uvicorn.run(app, host="0.0.0.0", port=8000)
          
          threading.Thread(target=start_server, daemon=True).start()
          time.sleep(3) # Wait for server

          print("🚇 Starting Cloudflare Tunnel...")
          proc = subprocess.Popen(["./cloudflared", "tunnel", "--url", "http://localhost:8000"], 
                                  stdout=subprocess.PIPE, stderr=subprocess.PIPE, text=True)

          relay_url = None
          # Parse logs to find the "trycloudflare.com" URL
          while True:
              line = proc.stderr.readline()
              if "trycloudflare.com" in line:
                  match = re.search(r"https://[a-zA-Z0-9-]+\.trycloudflare\.com", line)
                  if match:
                      relay_url = match.group(0)
                      break
          
          print(f"✅ RELAY LIVE: {relay_url}")

          # --- 3. UPDATE GITHUB REGISTRY ---
          # FIXED: Added /repos/ to API paths
          api_url = f"https://api.github.com/repos/{repo}/contents/status.json"
          headers = {
              "Authorization": f"token {gh_token}",
              "Accept": "application/vnd.github.v3+json"
          }
          
          try:
              curr = requests.get(api_url, headers=headers).json()
              content = json.loads(base64.b64decode(curr["content"]))
              content["relay_url"] = relay_url
              
              requests.put(api_url, headers=headers, json={
                  "message": "Update Relay URL (Cloudflare)",
                  "content": base64.b64encode(json.dumps(content).encode()).decode(),
                  "sha": curr["sha"]
              })
              print("🎉 GitHub Registry Updated!")
          except Exception as e:
              print(f"❌ Failed to update registry: {e}")

          # --- 4. HANDOFF TIMER ---
          print("⏳ Node Active. Sleeping for 5.5 hours...")
          time.sleep(19800)
          
          print("♻️ Triggering Handoff...")
          # FIXED: Added /repos/ to API paths
          requests.post(f"https://api.github.com/repos/{repo}/dispatches", 
                        headers=headers, json={"event_type": "handoff"})
          
          time.sleep(300)
          '
