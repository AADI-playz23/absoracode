name: AbsoraCloud Relay
on:
  workflow_dispatch:
  repository_dispatch:
    types: [handoff]

jobs:
  run-relay:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      
      - name: Start Relay & Tunnel
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          npm install express node-fetch@2
          
          # Install Cloudflare
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb
          
          # Start Node.js Router
          node server.js &
          
          # Open Cloudflare Tunnel
          cloudflared tunnel --url http://localhost:8000 > tunnel.log 2>&1 &
          sleep 15
          
          # Extract URL
          RELAY_URL=$(grep -o 'https://[a-zA-Z0-9-]*\.trycloudflare\.com' tunnel.log | head -n 1)
          
          # Update status.json
          python3 -c "
          import requests, json, base64, os
          url = '$RELAY_URL'
          token = os.environ.get('GH_TOKEN')
          repo = 'AADI-playz23/absoracode'
          api_url = f'https://api.github.com/repos/{repo}/contents/status.json'
          headers = {'Authorization': f'token {token}'}
          
          res = requests.get(api_url, headers=headers).json()
          data = json.loads(base64.b64decode(res['content']))
          data['relay_url'] = url
          
          requests.put(api_url, headers=headers, json={
              'message': 'Update Relay URL (Cloudflare)',
              'content': base64.b64encode(json.dumps(data).encode()).decode(),
              'sha': res['sha']
          })
          "
          echo "✅ CLOUDFLARE RELAY LIVE: $RELAY_URL"
          
          # Keep alive for 5.5 hours
          sleep 19800 
          
          # Handoff to next runner
          curl -X POST https://api.github.com/repos/AADI-playz23/absoracode/dispatches \
          -H "Authorization: token $GH_TOKEN" -d '{"event_type": "handoff"}'
